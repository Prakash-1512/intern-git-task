<!DOCTYPE html>
<html>
<head>
    <title>My Web Page</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 100px;
        }

        .box{
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            color: blue;
        }

        p{
            color: #333;
        }

        button{
            background: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: darkblue;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome NK Bala</h1>

        <p>This is my first web page.</p>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage(){
            alert("Hello NK Bala! Welcome to Web Development 🚀");
        }
    </script>

</body>
</html>
