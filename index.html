<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #333;
    }

    /* Navbar */
    nav {
      background: #0f172a;
      color: white;
      padding: 15px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav h1 {
      font-size: 22px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li {
      cursor: pointer;
    }

    nav ul li:hover {
      color: #38bdf8;
    }

    /* Hero Section */
    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to right, #38bdf8, #6366f1);
      color: white;
      padding: 20px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      background: white;
      color: #6366f1;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0f172a;
      color: white;
    }

    /* Cards Section */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      background: #0f172a;
      color: white;
    }

    /* Responsive */
    @media(max-width: 600px) {
      .hero h2 {
        font-size: 28px;
      }
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h1>MySite</h1>
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div>
      <h2>Welcome to My Website</h2>
      <p>Simple, Clean & Modern UI Design</p>
      <button class="btn">Get Started</button>
    </div>
  </section>

  <!-- Cards Section -->
  <section class="cards">
    <div class="card">
      <h3>Fast</h3>
      <p>Optimized for speed and performance.</p>
    </div>
    <div class="card">
      <h3>Responsive</h3>
      <p>Works perfectly on all devices.</p>
    </div>
    <div class="card">
      <h3>Modern</h3>
      <p>Clean and professional design.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Website | Designed by Bala</p>
  </footer>

</body>
</html>
